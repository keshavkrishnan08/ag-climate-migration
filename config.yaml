# config.yaml — Single source of truth
crops:
  primary: [corn, soybeans, wheat_winter, wheat_spring, cotton, sorghum, barley, oats]
  switching_pairs:  # Which switches to model explicitly
    - [corn, soybeans]
    - [corn, sorghum]
    - [cotton, soybeans]
    - [wheat_winter, wheat_spring]

geography:
  fips_exclude: ['02', '15', '72']  # AK, HI, PR
  n_counties: 3108

temporal:
  train_end: 2005
  val_end: 2012
  test_end: 2023
  projection_end: 2050
  baseline_climate: [1981, 2010]

climate_scenarios:
  - SSP245    # moderate (primary scenario for paper, mapped from RCP 4.5)
  # SSP126 and SSP585 not yet downloaded — run with SSP245 only

yield_model:
  algorithm: lightgbm
  n_estimators: 1000
  learning_rate: 0.03
  max_depth: 6
  num_leaves: 63
  min_child_samples: 20
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 1.0
  random_seed: 42
  cv_folds: 5  # temporal rolling folds

stranded_assets:
  discount_rate: 0.04
  projection_horizon: 30  # years
  baseline_period: [1990, 2005]

community_cascade:
  yield_shock_threshold: -0.15    # 15% yield decline triggers cascade
  income_elasticity_migration: -0.17  # From Feng et al. literature
  school_enrollment_elasticity: -0.25
  hospital_threshold_population: 15000

insurance:
  lookback_years: 10    # RMA uses 10-year APH
  subsidy_rate_avg: 0.62   # Federal subsidy as % of premium

deflation:
  base_year: 2023
  cpi_series: 'CPIAUCSL'  # FRED series

cmip6_models:
  - ACCESS-CM2
  - CESM2
  - CNRM-CM6-1
  - GFDL-ESM4
  - HadGEM3-GC31-LL
  - IPSL-CM6A-LR
  - MIROC6
  - MPI-ESM1-2-HR
  - MRI-ESM2-0
  - NorESM2-MM

gdd_thresholds:
